<!DOCTYPE html>
<html lang="en">
<head>
     <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7RR9QPGJ35"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-7RR9QPGJ35');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Acclaimable Grant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body class="bg-yellow-50 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-xl shadow-lg p-10 w-full max-w-md mx-4">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900 mb-1">Acclaimable Grant</h1>
            <p class="text-gray-500 text-sm">Admin Portal</p>
            <div class="mt-4 w-16 h-1 bg-yellow-400 mx-auto rounded"></div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label for="adminEmail" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" id="adminEmail" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="admin@acclaimablegrant.com">
            </div>
            <div>
                <label for="adminPassword" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="adminPassword" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="Enter your password">
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div id="loginError" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg">
                <p class="text-red-600 text-sm"><i class="fas fa-exclamation-circle mr-2"></i><span id="loginErrorText"></span></p>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition">
                Login
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">This page is restricted to authorized administrators only.</p>
    </div>

    <script type="module" src="admin-login.js"></script>
</body>
</html>
